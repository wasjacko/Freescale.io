<!doctype html>
<html lang="fr" data-theme="light">

<head>
  <meta charset="utf-8">
  <title>Freescale — Le copilote des freelances tech</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="freescale/styles.css">
</head>

<body>
  <div id="root"></div>
  <style>
    html, body { overflow: hidden; height: 100vh; }
    #error-box:empty { display: none; }
  </style>
  <pre id="error-box"
    style="display: none; position: fixed; bottom: 0; left: 0; right: 0; max-height: 200px; overflow: auto; color: red; padding: 20px; font-family: monospace; white-space: pre-wrap; font-size: 14px; background: #fee; z-index: 9999; border-top: 2px solid red;"></pre>
  <script>
    window.addEventListener('error', function (e) {
      const box = document.getElementById('error-box');
      box.style.display = 'block';
      box.textContent += e.message + '\n' + e.filename + ':' + e.lineno + ':' + e.colno + '\n' + (e.error ? e.error.stack : '') + '\n\n';
    });
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <script src="freescale/data.js?v=7"></script>
  <script src="freescale/gmail-connector.js?v=1"></script>
  <script type="text/babel" src="freescale/Icon.jsx?v=3"></script>
  <script type="text/babel" src="freescale/Sidebar.jsx?v=43"></script>
  <script type="text/babel" src="freescale/TopBar.jsx?v=12"></script>
  <script type="text/babel" src="freescale/TodayView.jsx?v=40"></script>
  <script type="text/babel" src="freescale/InboxView.jsx?v=12"></script>
  <script type="text/babel" src="freescale/OtherViews.jsx?v=3"></script>
  <script type="text/babel" src="freescale/SettingsModal.jsx?v=3"></script>
  <script type="text/babel" src="freescale/ChannelConnectorModal.jsx?v=1"></script>
  <script type="text/babel" src="freescale/App.jsx?v=28"></script>

  <!-- Tweaks (edit-mode defaults for persistence) -->
  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "light",
      "copilotVisible": true
    }/*EDITMODE-END*/;
  </script>
</body>

</html>
