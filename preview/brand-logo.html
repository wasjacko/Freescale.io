<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-surface); font-family: var(--font-sans); }
  .wrap { display:grid; grid-template-columns: 72px 1fr; gap: 24px; align-items:center; }
  .mark { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .mark img { width: 72px; height: 72px; }
  .info h2 { margin: 0 0 4px; font-size: 22px; letter-spacing: -0.014em; }
  .info p { margin: 0 0 8px; font-size: 13px; color: var(--fg-3); line-height: 1.5; }
  .swatches { display:flex; gap: 6px; }
  .sw { width: 22px; height: 22px; border-radius: 4px; }
</style></head>
<body>
  <div class="wrap">
    <div class="mark"><img src="../assets/airtable-logomark.svg" alt="Airtable"/></div>
    <div class="info">
      <h2>airtable</h2>
      <p>The logomark — a 4-color geometric "A / stacked cube" in yellow, cyan, red.</p>
      <div class="swatches">
        <div class="sw" style="background:#FCB400"></div>
        <div class="sw" style="background:#18BFFF"></div>
        <div class="sw" style="background:#F82B60"></div>
        <div class="sw" style="background:#1D1F25"></div>
      </div>
    </div>
  </div>
</body></html>
