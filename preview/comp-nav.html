<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:0; background:var(--bg-page); font-family: var(--font-sans); }
  .nav { display:flex; align-items:center; justify-content:space-between; padding: 14px 24px; background: rgba(249,249,247,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
  .left { display:flex; align-items:center; gap: 28px; }
  .logo { display:flex; align-items:center; gap: 8px; font-weight: 700; font-size: 17px; letter-spacing: -0.015em; color: var(--fg-1); }
  .logo img { width: 22px; height: 22px; }
  .menu { display:flex; gap: 22px; font-size: 14px; font-weight: 500; color: var(--fg-1); }
  .menu a { color: inherit; text-decoration: none; display:flex; align-items:center; gap: 3px; }
  .menu a::after { content: '▾'; font-size: 9px; color: var(--fg-3); }
  .right { display:flex; align-items:center; gap: 10px; }
  .btn { padding: 8px 14px; border-radius: var(--r-md); font-size: 13px; font-weight: 600; border: 0; cursor: pointer; font-family: inherit; }
  .btn-ghost { background: transparent; color: var(--fg-1); }
  .btn-primary { background: var(--gray-800); color: #fff; }
  .btn-outline { background: transparent; color: var(--fg-1); border: 1px solid var(--border-2); }
</style></head>
<body>
  <nav class="nav">
    <div class="left">
      <div class="logo"><img src="../assets/airtable-logomark.svg" alt=""/> airtable</div>
      <div class="menu"><a>Platform</a><a>Solutions</a><a>Resources</a><a>Enterprise</a><a>Pricing</a></div>
    </div>
    <div class="right">
      <button class="btn btn-ghost">Book demo</button>
      <button class="btn btn-ghost">Sign in</button>
      <button class="btn btn-primary">Sign up for free</button>
    </div>
  </nav>
</body></html>
