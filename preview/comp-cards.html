<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); font-family: var(--font-sans); }
  .row { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: var(--bg-surface); border: 1px solid var(--border-1); border-radius: var(--r-xl); padding: 18px; box-shadow: var(--shadow-sm); }
  .eyebrow { font-size: 12px; font-weight: 600; color: var(--fg-2); margin-bottom: 8px; display:flex; align-items:center; gap: 6px; }
  .eyebrow .num { font-family: var(--font-mono); color: var(--fg-3); font-weight: 500; }
  .title { font-size: 18px; font-weight: 600; letter-spacing: -0.008em; color: var(--fg-1); margin-bottom: 6px; }
  .body { font-size: 13px; line-height: 1.5; color: var(--fg-2); margin-bottom: 12px; }
  .link { font-size: 13px; font-weight: 600; color: var(--fg-1); text-decoration:none; }
  .link::after { content: ' →'; }
  .thumb { border-radius: var(--r-lg); overflow:hidden; background: linear-gradient(135deg,#F1EFE8,#E9E5DA); height: 60px; display:flex; align-items:center; justify-content:center; }
</style></head>
<body>
  <div class="row">
    <div class="card">
      <div class="eyebrow"><span class="num">01</span>AI app building</div>
      <div class="title">Production apps at prototype speed</div>
      <div class="body">Streamline critical data through conversational building. No technical expertise required.</div>
      <a class="link">Learn more</a>
    </div>
    <div class="card" style="padding:0; overflow:hidden">
      <div class="thumb" style="height:90px; border-radius:0">
        <div style="font-size:12px; color:var(--fg-3)">product screenshot</div>
      </div>
      <div style="padding: 14px 16px">
        <div class="title" style="font-size:15px">In action: Airtable ProductCentral</div>
        <div class="body" style="font-size:12px; margin-bottom:0">See how ProductCentral delivers a complete view of product investments at every altitude.</div>
      </div>
    </div>
  </div>
</body></html>
