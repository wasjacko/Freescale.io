<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-surface); font-family: var(--font-sans); }
  .big { font-family: var(--font-sans); font-size: 72px; letter-spacing: -0.025em; font-weight: 600; color: var(--fg-1); line-height: 1; }
  .small { font-size: 13px; color: var(--fg-3); font-family: var(--font-mono); margin-top: 8px; }
  .row { display:grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 12px; }
  .ctl { display:flex; gap: 6px; flex-wrap: wrap; font-size: 11px; }
  .ctl span { padding: 3px 7px; border-radius: var(--r-pill); background: var(--gray-100); color: var(--fg-2); }
</style></head>
<body>
  <div class="big">Aa</div>
  <div class="small">Inter (substituted for Airtable Sans) · 400 / 500 / 600 / 700</div>
  <div class="row">
    <div class="ctl"><span>400 Regular</span><span>500 Medium</span><span>600 Semibold</span><span>700 Bold</span></div>
    <div class="ctl"><span>slnt: 0°</span><span>OpenType: ss01, ss02</span><span>tnum for data</span></div>
  </div>
</body></html>
