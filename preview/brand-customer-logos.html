<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:18px; background:var(--bg-surface); font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(6, 1fr); gap: 20px 12px; align-items:center; justify-items:center; }
  img { max-height: 28px; max-width: 100%; filter: grayscale(1) brightness(0.35); opacity: 0.85; }
</style></head>
<body>
  <div class="grid">
    <img src="../assets/customer-logos/openai.svg" alt="OpenAI">
    <img src="../assets/customer-logos/anthropic.svg" alt="Anthropic">
    <img src="../assets/customer-logos/google.svg" alt="Google">
    <img src="../assets/customer-logos/amazon.svg" alt="Amazon">
    <img src="../assets/customer-logos/netflix.svg" alt="Netflix">
    <img src="../assets/customer-logos/walmart.svg" alt="Walmart">
    <img src="../assets/customer-logos/airbnb.svg" alt="Airbnb">
    <img src="../assets/customer-logos/ford.svg" alt="Ford">
    <img src="../assets/customer-logos/hbo.svg" alt="HBO">
    <img src="../assets/customer-logos/nyt.svg" alt="NYT">
    <img src="../assets/customer-logos/amex.svg" alt="Amex">
    <img src="../assets/customer-logos/coca-cola.svg" alt="Coca-Cola">
  </div>
</body></html>
