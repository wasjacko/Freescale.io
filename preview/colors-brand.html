<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--bg-surface); }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border-radius: var(--r-lg); overflow: hidden; border:1px solid var(--border-1); }
  .sw .chip { aspect-ratio: 2.2/1; }
  .sw .meta { padding: 8px 10px; background: var(--bg-surface); }
  .name { font-size: 12px; font-weight: 600; color: var(--fg-1); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FCB400"></div><div class="meta"><div class="name">Yellow</div><div class="hex">#FCB400</div></div></div>
    <div class="sw"><div class="chip" style="background:#18BFFF"></div><div class="meta"><div class="name">Blue</div><div class="hex">#18BFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#F82B60"></div><div class="meta"><div class="name">Red</div><div class="hex">#F82B60</div></div></div>
    <div class="sw"><div class="chip" style="background:#7C37EF"></div><div class="meta"><div class="name">Purple</div><div class="hex">#7C37EF</div></div></div>
  </div>
</body></html>
