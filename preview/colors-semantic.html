<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--bg-surface); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .row { display:flex; align-items:center; gap: 12px; }
  .sw { width: 44px; height: 44px; border-radius: var(--r-sm); border: 1px solid var(--border-1); flex: none; }
  .meta .name { font-size: 13px; font-weight: 600; color: var(--fg-1); }
  .meta .desc { font-size: 11px; color: var(--fg-3); }
  .meta .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
</style></head>
<body>
  <div class="grid">
    <div class="row"><div class="sw" style="background:#1F6FEB"></div><div class="meta"><div class="name">fg-link</div><div class="desc">Hyperlinks</div><div class="hex">#1F6FEB</div></div></div>
    <div class="row"><div class="sw" style="background:#D13B3B"></div><div class="meta"><div class="name">fg-danger</div><div class="desc">Errors, destructive</div><div class="hex">#D13B3B</div></div></div>
    <div class="row"><div class="sw" style="background:#178A3A"></div><div class="meta"><div class="name">fg-success</div><div class="desc">Confirmations</div><div class="hex">#178A3A</div></div></div>
    <div class="row"><div class="sw" style="background:#2D7FF9"></div><div class="meta"><div class="name">border-focus</div><div class="desc">Focus ring (select-blue)</div><div class="hex">#2D7FF9</div></div></div>
  </div>
</body></html>
